<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoey | 音乐作品</title>
  <meta name="description" content="Zoey 的音乐作品入口，包含单曲、Demo 与声音实验。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@400;500;600;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="music">
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="回到首页">
        <span class="brand-mark">Z</span>
        <span class="brand-text">
          <strong>Zoey</strong>
          <em>notes & works</em>
        </span>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        <span></span>
        <span></span>
      </button>

      <nav class="nav" id="site-nav" aria-label="主导航"></nav>
    </header>

    <main class="subpage-main">
      <section class="sub-hero whiteboard">
        <p class="section-label">Music Archive</p>
        <p class="lead">这里可以继续接入真实音频、平台链接或作品详情。资源目录已预留在 `audio/`。</p>
      </section>

      <section class="content-grid">
        <article class="paper content-card">
          <p class="section-label">Latest</p>
          <h2>最新发布</h2>
          <p>用来展示主打单曲、EP 或近期演出片段。</p>
        </article>
        <article class="paper content-card">
          <p class="section-label">Demo</p>
          <h2>样带与草稿</h2>
          <p>适合放未公开片段、制作日志或创作过程。</p>
        </article>
        <article class="paper content-card">
          <p class="section-label">Links</p>
          <h2>平台入口</h2>
          <p>可以补充网易云、Spotify、Apple Music、Bilibili 等外链。</p>
        </article>
      </section>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
