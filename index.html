<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoey | 个人网站</title>
  <meta name="description" content="Zoey 的个人网站首页，收纳碎碎念、文章、音乐、视觉与工具。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="home">
  <header class="topbar home-topbar" aria-label="全站主导航"></header>

  <main class="home-page">
    <section class="home-hero hero" aria-label="Zoey 世界入口">
      <img class="hero-cover hero-visual__image" id="homeHeroImage" alt="">
      <div class="hero-overlay" aria-hidden="true"></div>
      <div class="hero-content hero-copy" id="homeHeroCopy"></div>
    </section>

    <div class="home-scroll-layer">
      <section class="home-section recent">
        <div class="home-section-heading">
          <div>
            <p class="section-label">Recent Activity</p>
            <h2>最近更新。</h2>
          </div>
          <div class="home-recent-stats" id="homeRecentStats" aria-label="站点内容统计"></div>
        </div>
        <div class="home-recent-grid" id="homeRecentGrid" aria-live="polite"></div>
      </section>

      <section class="home-section sections">
        <div class="home-section-heading">
          <div>
            <p class="section-label">Sections</p>
            <h2>栏目精选</h2>
          </div>
          <p>按栏目继续浏览。</p>
        </div>
        <div class="home-browse-grid" id="homeBrowseGrid" aria-live="polite"></div>
      </section>

    </div>
  </main>

  <footer class="home-footer" aria-label="页脚">
    <div class="home-footer__inner">
      <div class="home-footer__brand">
        <strong>Zoey Site</strong>
        <p>Notes, Works, Fragments</p>
      </div>

      <nav class="home-footer__nav" aria-label="Footer Navigation">
        <p>Navigation</p>
        <a href="notes.html">Notes</a>
        <a href="writing.html">Writing</a>
        <a href="music.html">Music</a>
        <a href="gallery.html">Visual</a>
        <a href="tools.html">Tools</a>
      </nav>

      <div class="home-footer__meta">
        <p>Updated from Shanghai / Tokyo</p>
        <p>© 2026 Zoey</p>
      </div>
    </div>
  </footer>

  <script src="js/lib/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/pages/home.js"></script>
</body>
</html>
