<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoey | 写作</title>
  <meta name="description" content="Zoey 的写作主页，按分类组织已发布文章。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="writing">
  <div class="page-shell page-shell-wide subpage-frame">
    <header class="topbar" aria-label="全站主导航"></header>

    <main class="subpage-main writing-shell">
      <div class="subpage-system writing-layout">
        <aside class="subpage-sidebar-left writing-rail">
          <div class="subpage-rail-card writing-rail-inner">
            <div class="writing-rail-head">
              <p class="section-label">Writing / Essays / Notes</p>
              <h1>写作</h1>
              <p>从 Supabase 读取已发布文章，保留统一版心与分栏比例，让列表、筛选和详情页都能继续自然生长。</p>
            </div>

            <nav class="writing-category-nav" id="writingCategoryNav" aria-label="写作分类导航"></nav>
          </div>
        </aside>

        <section class="subpage-content-main writing-stage">
          <section class="subpage-content-intro">
            <p class="section-label">Writing Frontpage</p>
            <p class="writing-feed-lead" id="writingPageLead">这里先展示所有已发布文章，你可以按分类或关键词继续筛选。</p>
          </section>

          <main class="writing-feed">
            <div class="writing-sections" id="writingSections" aria-live="polite"></div>
          </main>
        </section>

        <aside class="subpage-sidebar-right writing-aside">
          <section class="writing-panel">
            <p class="section-label">Search</p>
            <h3>搜索</h3>
            <label class="writing-search" for="writingSearchInput">
              <span class="sr-only">搜索文章</span>
              <input type="search" id="writingSearchInput" class="writing-search-input" placeholder="搜索标题、摘要、分类">
            </label>
          </section>

          <section class="writing-panel">
            <p class="section-label">Categories</p>
            <h3>分类</h3>
            <ul class="writing-meta-list" id="writingStats"></ul>
          </section>

          <section class="writing-panel">
            <p class="section-label">Recommended</p>
            <h3>推荐文章</h3>
            <div class="writing-side-stack" id="writingRecommended"></div>
          </section>

          <section class="writing-panel">
            <p class="section-label">Recent</p>
            <h3>最近更新</h3>
            <div class="writing-side-stack" id="writingRecent"></div>
          </section>
        </aside>
      </div>
    </main>
  </div>

  <script src="js/lib/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/pages/writing.js"></script>
</body>
</html>
