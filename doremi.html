ius:14px;padding:10px 12px;font-size:14px}\n    .muted{color:#64748b}\n    .badge{border-radius:999px;background:#e2e8f0;padding:4px 10px;font-size:12px;font-weight:800}\n    .feedback-ok{border:1px solid #86efac;background:#f0fdf4;color:#166534;border-radius:16px;padding:12px 14px;font-size:14px}\n    .feedback-bad{border:1px solid #fcd34d;background:#fffbeb;color:#92400e;border-radius:16px;padding:12px 14px;font-size:14px}\n    .track{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden}\n    .fill{height:100%;background:#0f172a;border-radius:999px}\n    .keyboard-wrap{background:linear-gradient(180deg,#f1f5f9 0%,#e2e8f0 100%)}\n    .keyboard-box{background:#0f172a;border:1px solid #1e293b;border-radius:24px;padding:12px;overflow-x:auto}\n    .keyboard-inner{position:relative;min-width:700px;padding-top:8px}\n    .white-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}\n    .white-key,.black-key{display:flex;flex-direction:column;justify-content:space-between;align-items:center;padding:10px;box-shadow:0 6px 16px rgba(15,23,42,.12)}\n    .white-key{height:224px;border-radius:10px 10px 24px 24px;border:1px solid #cbd5e1;background:#fff;color:#0f172a}\n    .black-slot{pointer-events:none;position:absolute;left:0;right:0;top:0;height:0}\n    .black-wrap{pointer-events:auto;position:absolute;top:0;width:10.5%}\n    .black-key{height:128px;width:72%;margin:0 auto;border-radius:8px 8px 18px 18px;border:1px solid #0f172a;background:linear-gradient(180deg,#475569 0%,#020617 100%);color:#fff}\n    .keycap{border-radius:10px;padding:4px 8px;font-size:12px;font-weight:800}\n    .white-key .keycap{border:1px solid #cbd5e1;background:#f8fafc}\n    .black-key .keycap{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#e2e8f0}\n    .active-correct{box-shadow:0 0 0 4px #4ade80,0 6px 16px rgba(15,23,42,.12)}\n    .active-wrong{box-shadow:0 0 0 4px #fbbf24,0 6px 16px rgba(15,23,42,.12)}\n    .disabled{opacity:.4;cursor:not-allowed}\n    .hint{border-style:dashed}\n    .recent-list,.stack{display:flex;flex-direction:column;gap:6px}\n    .staff-svg{width:100%;height:240px;display:block}\n    .staff-svg.grand{height:340px}\n    .progress-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}\n    .pill{width:22px;height:22px;border-radius:999px;border:1px solid #cbd5e1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:#fff}\n    .pill.done{background:#dcfce7;border-color:#86efac;color:#166534}\n    .pill.current{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}\n    @media (max-width: 1023px){.shell,.grid2{grid-template-columns:1fr}}\n    @media (max-width: 950px) and (orientation: landscape){\n      .page{padding:10px}.shell{grid-template-columns:1fr;gap:12px}.maincol,.sidecol{gap:12px}.sidecol{display:none}\n      .card{border-radius:16px}.card-body{padding:12px}.title{font-size:16px}.subtitle{display:none}\n      .split{gap:8px}.split .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%}\n      .grid2{grid-template-columns:1fr;gap:12px;margin-top:10px !important}.grid2 > div:last-child{display:none}\n      .staff-svg{height:126px}.staff-svg.grand{height:188px}.keyboard-inner{min-width:420px}\n      .white-key{height:88px;padding:5px}.black-key{height:54px;width:68%}.keycap{font-size:10px}\n      .hint{display:none}.btn,.select{font-size:11px;padding:7px 9px}.feedback-ok,.feedback-bad{font-size:12px;padding:8px}\n    }\n  </style>\n</head>\n<body>\n<div id=\"root\"></div>\n<script type=\"text/babel\">\nwindow.addEventListener(\"load\", () => {\nconst { useState, useEffect, useMemo, useRef, useCallback } = React;\n\nconst STORAGE_KEY = \"music_staff_trainer_phrase_html_v2\";\nconst NOTE_POOL = [\n  { id:\"C4\", step:\"C\", staffPos:-1, clef:\"treble\" }, { id:\"D4\", step:\"D\", staffPos:0, clef:\"treble\" },\n  { id:\"E4\", step:\"E\", staffPos:1, clef:\"treble\" }, { id:\"F4\", step:\"F\", staffPos:2, clef:\"treble\" },\n  { id:\"G4\", step:\"G\", staffPos:3, clef:\"treble\" }, { id:\"A4\", step:\"A\", staffPos:4, clef:\"treble\" },\n  { id:\"B4\", step:\"B\", staffPos:5, clef:\"treble\" }, { id:\"C5\", step:\"C\", staffPos:6, clef:\"treble\" },\n  { id:\"D5\", step:\"D\", staffPos:7, clef:\"treble\" }, { id:\"E5\", step:\"E\", staffPos:8, clef:\"treble\" },\n  { id:\"F5\", step:\"F\", staffPos:9, clef:\"treble\" }, { id:\"G5\", step:\"G\", staffPos:10, clef:\"treble\" },\n  { id:\"E2\", step:\"E\", staffPos:-1, clef:\"bass\" }, { id:\"F2\", step:\"F\", staffPos:0, clef:\"bass\" },\n  { id:\"G2\", step:\"G\", staffPos:1, clef:\"bass\" }, { id:\"A2\", step:\"A\", staffPos:2, clef:\"bass\" },\n  { id:\"B2\", step:\"B\", staffPos:3, clef:\"bass\" }, { id:\"C3\", step:\"C\", staffPos:4, clef:\"bass\" },\n  { id:\"D3\", step:\"D\", staffPos:5, clef:\"bass\" }, { id:\"E3\", step:\"E\", staffPos:6, clef:\"bass\" },\n  { id:\"F3\", step:\"F\", staffPos:7, clef:\"bass\" }, { id:\"G3\", step:\"G\", staffPos:8, clef:\"bass\" },\n  { id:\"A3\", step:\"A\", staffPos:9, clef:\"bass\" }, { id:\"B3\", step:\"B\", staffPos:10, clef:\"bass\" },\n  { id:\"C4_bass\", step:\"C\", staffPos:11, clef:\"bass\" },\n];\nconst CLEF_PRESETS = {\n  treble: NOTE_POOL.filter(n => n.clef === \"treble\"),\n  bass: NOTE_POOL.filter(n => n.clef === \"bass\"),\n  grand: [...NOTE_POOL],\n};\nconst WHITE_KEYS = [\"C\",\"D\",\"E\",\"F\",\"G\",\"A\",\"B\"];\nconst KEYBOARD_MAP = { a:\"C\", s:\"D\", d:\"E\", f:\"F\", g:\"G\", h:\"A\", j:\"B\" };\n\nfunction buildEmptyStats(){\n  const noteStats = {};\n  NOTE_POOL.forEach(n => noteStats[n.id] = { shown:0, correct:0, wrong:0, avgMs:0, streakWrong:0 });\n  return { noteStats, confusion:{}, recent:[] };\n}\nfunction loadStats(){\n  try{\n    const raw = localStorage.getItem(STORAGE_KEY);\n    if(!raw) return buildEmptyStats();\n    const saved = JSON.parse(raw);\n    const clean = buildEmptyStats();\n    Object.keys(clean.noteStats).forEach(k => { if(saved.noteStats?.[k]) clean.noteStats[k] = { ...clean.noteStats[k], ...saved.noteStats[k] }; });\n    clean.confusion = saved.confusion || {};\n    clean.recent = Array.isArray(saved.recent) ? saved.recent.slice(0,20) : [];\n    return clean;\n  } catch { return buildEmptyStats(); }\n}\nfunction saveStats(stats){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch {} }\nfunction clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }\nfunction getLedgerLines(note){\n  const lines = [];\n  if(note.staffPos <= -1) for(let p=-1;p>=note.staffPos;p-=2) lines.push(p);\n  if(note.staffPos >= 11) for(let p=11;p<=note.staffPos;p+=2) lines.push(p);\n  return lines;\n}\nfunction generatePhrase(notes, beats){\n  const usable = [...notes].sort((a,b) => a.staffPos - b.staffPos);\n  const center = Math.floor(usable.length / 2);\n  let idx = clamp(center + Math.floor((Math.random() - 0.5) * 8), 1, usable.length - 2);\n  const phrase = [usable[idx]];\n  let direction = Math.random() < 0.55 ? 1 : -1;\n\n  for(let i=1;i<beats;i++){\n    const roll = Math.random();\n    let stepMove = 0;\n    if(i === beats - 1){\n      const target = phrase[0].staffPos;\n      const diff = target - usable[idx].staffPos;\n      if(Math.abs(diff) <= 2) stepMove = diff === 0 ? 0 : Math.sign(diff);\n      else if(Math.abs(diff) <= 4) stepMove = Math.sign(diff) * 2;\n      else stepMove = Math.sign(diff) * 3;\n    } else if(roll < 0.42){\n      stepMove = direction;\n    } else if(roll < 0.62){\n      stepMove = direction * 2;\n    } else if(roll < 0.78){\n      stepMove = direction * 3;\n    } else if(roll < 0.88){\n      stepMove = 0;\n    } else {\n      stepMove = direction * 4;\n    }\n\n    if(i > 1 && Math.abs(stepMove) >= 3 && Math.random() < 0.72){\n      direction *= -1;\n    } else if(i > 1 && Math.random() < 0.2){\n      direction *= -1;\n    }\n\n    if(idx + stepMove < 0 || idx + stepMove >= usable.length){\n      direction *= -1;\n      stepMove = Math.sign(stepMove || direction) * Math.min(Math.abs(stepMove || 1), 2);\n    }\n\n    idx = clamp(idx + stepMove, 0, usable.length - 1);\n    phrase.push(usable[idx]);\n  }\n  return phrase;\n}\nfunction runSelfTests(){\n  const p34 = generatePhrase(CLEF_PRESETS.treble, 3);\n  const p44 = generatePhrase(CLEF_PRESETS.bass, 4);\n  console.assert(p34.length === 3, \"3/4 phrase should have 3 notes\");\n  console.assert(p44.length === 4, \"4/4 phrase should have 4 notes\");\n  console.assert(p34.every(n => n.clef === \"treble\"), \"Treble phrase should stay in treble clef\");\n  console.assert(p44.every(n => n.clef === \"bass\"), \"Bass phrase should stay in bass clef\");\n}\n\nfunction StatRow({ label, value }){\n  return <div className=\"stat\"><span className=\"muted\">{label}</span><span style={{fontWeight:800}}>{value}</span></div>;\n}\n\nfunction PianoKey({ label, hotkey, sub, dark=false, active=null, disabled=false, onClick }){\n  const cls = [dark ? \"black-key\" : \"white-key\", active ? (active === \"correct\" ? \"active-correct\" : \"active-wrong\") : \"\", disabled ? \"disabled\" : \"\"].join(\" \");\n  return <button type=\"button\" className={cls} disabled={disabled} onClick={disabled ? undefined : onClick}>\n    <div className=\"keycap\">{hotkey}</div>\n    <div style={{textAlign:\"center\"}}>\n      <div style={{fontSize: dark ? 18 : 28, fontWeight:800}}>{label}</div>\n      <div style={{fontSize:12, color: dark ? \"#cbd5e1\" : \"#64748b\", marginTop:4}}>{sub}</div>\n    </div>\n  </button>;\n}\n\nfunction AnswerKeyboard({ feedback, onAnswer }){\n  const active = feedback ? feedback.normalizedCorrectAnswer : null;\n  const activeType = feedback ? (feedback.isCorrect ? \"correct\" : \"wrong\") : null;\n  const blackKeys = [\n    { label:\"C#\", left:\"8.9%\", hotkey:\"W\" },\n    { label:\"D#\", left:\"23.2%\", hotkey:\"E\" },\n    { label:\"F#\", left:\"51.8%\", hotkey:\"T\" },\n    { label:\"G#\", left:\"66.1%\", hotkey:\"Y\" },\n    { label:\"A#\", left:\"80.4%\", hotkey:\"U\" },\n  ];\n  return <div className=\"keyboard-wrap\">\n    <div style={{fontSize:14, fontWeight:800, color:\"#334155\", marginBottom:10}}>\u94a2\u7434\u952e\u76d8\u7b54\u6848\u533a</div>\n    <div className=\"keyboard-box\">\n      <div className=\"keyboard-inner\">\n        <div className=\"white-grid\">\n          {WHITE_KEYS.map((token,i) => <PianoKey key={token} label={token} hotkey={[\"A\",\"S\",\"D\",\"F\",\"G\",\"H\",\"J\"][i]} sub=\"\u767d\u952e\" active={active===token?activeType:null} onClick={() => onAnswer(token)} />)}\n        </div>\n        <div className=\"black-slot\">\n          {blackKeys.map(k => <div key={k.label} className=\"black-wrap\" style={{left:k.left}}><PianoKey label={k.label} hotkey={k.hotkey} sub=\"\u9ed1\u952e\" dark disabled /></div>)}\n        </div>\n      </div>\n    </div>\n    {feedback && !feedback.isCorrect && <div className=\"feedback-bad\" style={{marginTop:10}}>\u5df2\u9ad8\u4eae\u6b63\u786e\u952e\u4f4d\u3002</div>}\n  </div>;\n}\n\nfunction SingleStaff({ notesToDraw, clef, yOffset=0, dimmed=false, showLabelIndex=null, activeIndex=null, staffConfig, timeSig=null }){\n  const { topY, spacing, lineStartX, lineEndX, noteStartX, noteSpacing, trebleX, bassX, stemLength, labelOffsetX } = staffConfig;\n  const lineYs = [4,3,2,1,0].map(i => topY + i*spacing + yOffset);\n  const yForPos = staffPos => topY + 4*spacing - (staffPos - 1) * (spacing/2) + yOffset;\n  const clefX = clef === \"treble\" ? trebleX : bassX;\n  const clefY = clef === \"treble\" ? yForPos(3) + spacing * 0.25 : yForPos(5) + spacing * 0.15;\n  const clefFont = clef === \"treble\" ? spacing * 4.2 : spacing * 3.4;\n  const timeX = clefX + spacing * 1.2;\n  return <>\n    <text x={clefX} y={clefY} fontSize={clefFont} textAnchor=\"middle\" dominantBaseline=\"central\" fontFamily='\"Segoe UI Symbol\", \"Noto Music\", serif' opacity={dimmed ? 0.4 : 1}>{clef === \"treble\" ? \"\ud834\udd1e\" : \"\ud834\udd22\"}</text>\n    {timeSig && <>\n      <text x={timeX} y={yForPos(5) - spacing * 0.25} fontSize={spacing * 1.3} fontWeight=\"700\" textAnchor=\"middle\">{timeSig.top}</text>\n      <text x={timeX} y={yForPos(3) + spacing * 0.25} fontSize={spacing * 1.3} fontWeight=\"700\" textAnchor=\"middle\">{timeSig.bottom}</text>\n    </>}\n    {lineYs.map((y,idx) => <line key={idx + \"-\" + yOffset + clef} x1={lineStartX} y1={y} x2={lineEndX} y2={y} stroke=\"black\" strokeWidth=\"1.5\" opacity={dimmed ? 0.4 : 1} />)}\n    {notesToDraw.map((note, idx) => {\n      const noteX = noteStartX + idx * noteSpacing;\n      const noteY = yForPos(note.staffPos);\n      const ledger = getLedgerLines(note);\n      const stemUp = note.staffPos < 5;\n      const isActive = activeIndex === idx && !dimmed;\n      const isLabel = showLabelIndex === idx && !dimmed;\n      const fill = isActive ? \"#1d4ed8\" : \"black\";\n      return <g key={note.id + \"-\" + idx} opacity={dimmed ? 0.22 : 1}>\n        {ledger.map((p,i) => <line key={i} x1={noteX - 28} y1={yForPos(p)} x2={noteX + 28} y2={yForPos(p)} stroke=\"black\" strokeWidth=\"1.5\" />)}\n        <ellipse cx={noteX} cy={noteY} rx={spacing * 0.62} ry={spacing * 0.44} fill={fill} transform={`rotate(-20 ${noteX} ${noteY})`} />\n        {stemUp\n          ? <line x1={noteX + spacing * 0.5} y1={noteY} x2={noteX + spacing * 0.5} y2={noteY - stemLength} stroke={fill} strokeWidth=\"2\" />\n          : <line x1={noteX - spacing * 0.5} y1={noteY} x2={noteX - spacing * 0.5} y2={noteY + stemLength} stroke={fill} strokeWidth=\"2\" />}\n        {isLabel && <text x={noteX + labelOffsetX} y={noteY + 5} fontSize={spacing * 0.85} fontWeight=\"700\" fill=\"#b45309\">{note.step}</text>}\n      </g>;\n    })}\n    <line x1={lineEndX} y1={lineYs[0]} x2={lineEndX} y2={lineYs[4]} stroke=\"black\" strokeWidth=\"2\" opacity={dimmed ? 0.4 : 1} />\n  </>;\n}\n\nfunction Staff({ phraseNotes, clefMode, activeIndex, showLabelIndex, meter }){\n  const singleConfig = { topY:36, spacing:20, lineStartX:88, lineEndX:304, noteStartX:156, noteSpacing:38, trebleX:58, bassX:58, stemLength:38, labelOffsetX:26 };\n  const grandConfig = { ...singleConfig };\n  if(clefMode !== \"grand\"){\n    return <svg viewBox=\"0 0 330 178\" className=\"staff-svg\"><SingleStaff notesToDraw={phraseNotes} clef={clefMode} activeIndex={activeIndex} showLabelIndex={showLabelIndex} staffConfig={singleConfig} timeSig={meter} /></svg>;\n  }\n  const upper = phraseNotes.filter(n => n.clef === \"treble\");\n  const lower = phraseNotes.filter(n => n.clef === \"bass\");\n  const activeNote = phraseNotes[activeIndex];\n  const upperActive = activeNote?.clef === \"treble\" ? upper.findIndex(n => n.id === activeNote.id) : null;\n  const lowerActive = activeNote?.clef === \"bass\" ? lower.findIndex(n => n.id === activeNote.id) : null;\n  const labelNote = showLabelIndex != null ? phraseNotes[showLabelIndex] : null;\n  const upperLabel = labelNote?.clef === \"treble\" ? upper.findIndex(n => n.id === labelNote.id) : null;\n  const lowerLabel = labelNote?.clef === \"bass\" ? lower.findIndex(n => n.id === labelNote.id) : null;\n  const ghostTreble = { id:\"ghost-t\", step:\"B\", staffPos:5, clef:\"treble\" };\n  const ghostBass = { id:\"ghost-b\", step:\"D\", staffPos:5, clef:\"bass\" };\n  return <>\n    <svg viewBox=\"0 0 330 320\" className=\"staff-svg grand\">\n      <SingleStaff notesToDraw={upper.length ? upper : [ghostTreble]} clef=\"treble\" yOffset={0} dimmed={!upper.length} activeIndex={upperActive} showLabelIndex={upperLabel} staffConfig={grandConfig} timeSig={meter} />\n      <SingleStaff notesToDraw={lower.length ? lower : [ghostBass]} clef=\"bass\" yOffset={128} dimmed={!lower.length} activeIndex={lowerActive} showLabelIndex={lowerLabel} staffConfig={grandConfig} timeSig={meter} />\n    </svg>\n    <div className=\"muted\" style={{fontSize:12, marginTop:6}}>\u6309\u4ece\u5de6\u5230\u53f3\u7684\u987a\u5e8f\u4f9d\u6b21\u4f5c\u7b54\u5f53\u524d\u9ad8\u4eae\u97f3\u7b26\u3002</div>\n  </>;\n}\n\nfunction App(){\n  const [clef, setClef] = useState(\"treble\");\n  const [trainingMode, setTrainingMode] = useState(\"single\");\n  const [meterTop, setMeterTop] = useState(4);\n  const [stats, setStats] = useState(() => loadStats());\n  const [questionCount, setQuestionCount] = useState(0);\n  const [correctCount, setCorrectCount] = useState(0);\n  const [feedback, setFeedback] = useState(null);\n  const [showHint, setShowHint] = useState(true);\n  const [sessionStartedAt] = useState(() => Date.now());\n  const [questionStartedAt, setQuestionStartedAt] = useState(() => Date.now());\n  const timeoutRef = useRef(null);\n  const notes = useMemo(() => CLEF_PRESETS[clef], [clef]);\n  const [phraseNotes, setPhraseNotes] = useState(() => [NOTE_POOL[0]]);\n  const [activeIndex, setActiveIndex] = useState(0);\n\n  useEffect(() => { runSelfTests(); }, []);\n  const makeSingle = useCallback(() => [notes[Math.floor(Math.random() * notes.length)]], [notes]);\n  const makePhrase = useCallback(() => generatePhrase(notes, meterTop), [notes, meterTop]);\n\n  useEffect(() => {\n    const seq = trainingMode === \"single\" ? makeSingle() : makePhrase();\n    setPhraseNotes(seq);\n    setActiveIndex(0);\n    setFeedback(null);\n    setQuestionStartedAt(Date.now());\n  }, [clef, meterTop, trainingMode, makeSingle, makePhrase]);\n\n  useEffect(() => { saveStats(stats); }, [stats]);\n  useEffect(() => () => { if(timeoutRef.current != null) window.clearTimeout(timeoutRef.current); }, []);\n\n  const current = phraseNotes[activeIndex];\n  const accuracy = questionCount ? Math.round(correctCount / questionCount * 100) : 0;\n  const elapsedMin = ((Date.now() - sessionStartedAt) / 60000).toFixed(1);\n  const weakestNotes = useMemo(() =>\n    [...notes].map(n => {\n      const s = stats.noteStats[n.id] || { shown:0, wrong:0 };\n      const shown = s.shown || 0;\n      const wrongRate = shown ? s.wrong / shown * 100 : 0;\n      return { id:n.id, label:n.step, shown, wrongRate };\n    }).sort((a,b) => b.wrongRate - a.wrongRate || b.shown - a.shown).slice(0,5), [notes, stats]);\n  const confusionPairs = useMemo(() => Object.entries(stats.confusion).map(([key,count]) => ({ key, count })).sort((a,b) => b.count - a.count).slice(0,5), [stats]);\n\n  function spawnNext(localStats = stats){\n    const seq = trainingMode === \"single\" ? makeSingle() : makePhrase();\n    setPhraseNotes(seq); setActiveIndex(0); setFeedback(null); setQuestionStartedAt(Date.now());\n    if(localStats !== stats) setStats(localStats);\n  }\n  function handleAnswer(answer){\n    if(!current) return;\n    if(feedback?.isCorrect && trainingMode === \"single\") return;\n    const duration = Date.now() - questionStartedAt;\n    const isCorrect = answer === current.step;\n    const newStats = JSON.parse(JSON.stringify(stats));\n    const s = newStats.noteStats[current.id];\n    s.shown += 1;\n    s.avgMs = s.avgMs === 0 ? duration : Math.round(s.avgMs * 0.7 + duration * 0.3);\n    if(isCorrect){ s.correct += 1; s.streakWrong = 0; }\n    else {\n      s.wrong += 1; s.streakWrong += 1;\n      const key = `${current.step}->${answer}`;\n      newStats.confusion[key] = (newStats.confusion[key] || 0) + 1;\n    }\n    newStats.recent.unshift({ note: current.id, correctAnswer: current.step, answer, isCorrect, duration, at: Date.now() });\n    newStats.recent = newStats.recent.slice(0,20);\n    setStats(newStats);\n    setQuestionCount(v => v + 1);\n    if(isCorrect) setCorrectCount(v => v + 1);\n    if(isCorrect){\n      const atEnd = activeIndex >= phraseNotes.length - 1;\n      setFeedback({ isCorrect:true, message: trainingMode === \"single\" ? `\u2714 \u6b63\u786e\uff1a${current.step}` : (atEnd ? \"\u2714 \u5c0f\u8282\u5b8c\u6210\" : \"\u2714 \u6b63\u786e\uff0c\u7ee7\u7eed\u4e0b\u4e00\u4e2a\u97f3\"), normalizedCorrectAnswer: current.step, showLabelIndex: null });\n      if(atEnd){ timeoutRef.current = window.setTimeout(() => spawnNext(newStats), 260); }\n      else { setActiveIndex(v => v + 1); setQuestionStartedAt(Date.now()); }\n    } else {\n      setFeedback({ isCorrect:false, message:`\u2718 \u9519\u8bef\uff1a\u8fd9\u662f ${current.step}\uff0c\u8bf7\u6309\u5bf9\u5f53\u524d\u97f3\u540e\u518d\u7ee7\u7eed`, normalizedCorrectAnswer: current.step, showLabelIndex: activeIndex });\n    }\n  }\n  function resetSession(){ setQuestionCount(0); setCorrectCount(0); setFeedback(null); spawnNext(); }\n  function clearProgress(){ const clean = buildEmptyStats(); setStats(clean); saveStats(clean); setQuestionCount(0); setCorrectCount(0); setFeedback(null); spawnNext(clean); }\n\n  useEffect(() => {\n    function onKeyDown(e){\n      const target = e.target;\n      const tag = target?.tagName?.toLowerCase?.();\n      if(tag === \"input\" || tag === \"textarea\" || target?.isContentEditable) return;\n      const k = e.key.toLowerCase();\n      if(KEYBOARD_MAP[k]){ e.preventDefault(); handleAnswer(KEYBOARD_MAP[k]); }\n    }\n    window.addEventListener(\"keydown\", onKeyDown);\n    return () => window.removeEventListener(\"keydown\", onKeyDown);\n  }, [feedback, current, phraseNotes, activeIndex, trainingMode, stats, questionStartedAt]);\n\n  return <div className=\"page\">\n    <div className=\"shell\">\n      <div className=\"maincol\">\n        <div className=\"card\"><div className=\"card-body\">\n          <div className=\"split\">\n            <div>\n              <h1 className=\"title\">\ud83c\udfbc \u4e94\u7ebf\u8c31\u8bc6\u8c31\u8bad\u7ec3</h1>\n              <p className=\"subtitle\">\u589e\u5f3a\u65cb\u5f8b\u7248\uff1a\u4fdd\u6301\u65cb\u5f8b\u5408\u7406\u6027\uff0c\u540c\u65f6\u5141\u8bb8\u66f4\u660e\u663e\u7684\u8df3\u8fdb\u3002</p>\n            </div>\n            <div className=\"row\">\n              <select className=\"select\" value={clef} onChange={e => setClef(e.target.value)}>\n                <option value=\"treble\">\u9ad8\u97f3\u8c31\u53f7</option>\n                <option value=\"bass\">\u4f4e\u97f3\u8c31\u53f7</option>\n                <option value=\"grand\">\u4e0a\u4e0b\u53cc\u8c31\u8868</option>\n              </select>\n              <button className={trainingMode === \"single\" ? \"btn primary\" : \"btn\"} onClick={() => setTrainingMode(\"single\")}>\u5355\u97f3</button>\n              <button className={trainingMode === \"phrase\" ? \"btn primary\" : \"btn\"} onClick={() => setTrainingMode(\"phrase\")}>\u5c0f\u8282</button>\n              <select className=\"select\" value={meterTop} onChange={e => setMeterTop(Number(e.target.value))} disabled={trainingMode !== \"phrase\"}>\n                <option value={3}>3/4</option>\n                <option value={4}>4/4</option>\n              </select>\n              <button className=\"btn\" onClick={resetSession}>\u91cd\u7f6e\u672c\u8f6e</button>\n              <button className=\"btn\" onClick={clearProgress}>\u6e05\u7a7a\u5b58\u6863</button>\n            </div>\n          </div>\n\n          <div className=\"grid2\" style={{marginTop:10}}>\n            <div className=\"stack\">\n              <div className=\"card\"><div className=\"card-body\">\n                <Staff phraseNotes={phraseNotes} clefMode={clef} activeIndex={activeIndex} showLabelIndex={feedback?.showLabelIndex ?? null} meter={{top: meterTop, bottom: 4}} />\n                <div className=\"progress-pills\">\n                  {phraseNotes.map((n,i) => <div key={n.id + \"-\" + i} className={`pill ${i < activeIndex ? \"done\" : i === activeIndex ? \"current\" : \"\"}`}>{i+1}</div>)}\n                </div>\n                <div style={{height:6}} />\n                <AnswerKeyboard feedback={feedback} onAnswer={handleAnswer} />\n              </div></div>\n\n              {showHint && <div className=\"card hint\"><div className=\"card-body\" style={{fontSize:14,color:\"#475569\"}}>\n                {trainingMode === \"single\"\n                  ? \"\u5f53\u524d\u53ef\u76f4\u63a5\u6309\uff1aA / S / D / F / G / H / J\u3002\u7b54\u9519\u540e\u4f1a\u5728\u97f3\u7b26\u65c1\u663e\u793a\u97f3\u540d\uff0c\u5e76\u4e14\u9700\u8981\u6309\u5bf9\u4e86\u624d\u4f1a\u8fdb\u5165\u4e0b\u4e00\u9898\u3002\"\n                  : \"\u5c0f\u8282\u6a21\u5f0f\u4f1a\u5c3d\u91cf\u751f\u6210\u66f4\u50cf\u65cb\u5f8b\u7684\u8d70\u5411\uff1a\u4ee5\u7ea7\u8fdb\u4e3a\u4e3b\uff0c\u4f46\u5141\u8bb8\u66f4\u660e\u663e\u7684\u4e09\u5ea6\u3001\u56db\u5ea6\u548c\u5076\u53d1\u66f4\u5927\u8df3\u8fdb\uff1b\u5927\u8df3\u540e\u66f4\u5bb9\u6613\u53cd\u5411\u56de\u8865\u3002\"}\n              </div></div>}\n\n              <div className=\"row\">\n                <button className=\"btn secondary\" onClick={() => spawnNext()}>\u6362\u4e00\u9898</button>\n                <button className=\"btn\" onClick={() => setShowHint(v => !v)}>{showHint ? \"\u63d0\u793a\uff1a\u5f00\" : \"\u63d0\u793a\uff1a\u5173\"}</button>\n              </div>\n\n              {feedback && <div className={feedback.isCorrect ? \"feedback-ok\" : \"feedback-bad\"}>{feedback.message}</div>}\n            </div>\n\n            <div className=\"stack\">\n              <div className=\"card\"><div className=\"card-body\">\n                <h3 className=\"section-title\">\u672c\u8f6e\u72b6\u6001</h3>\n                <div className=\"stack\">\n                  <StatRow label=\"\u603b\u4f5c\u7b54\u6570\" value={questionCount} />\n                  <StatRow label=\"\u6b63\u786e\u6570\" value={correctCount} />\n                  <StatRow label=\"\u6b63\u786e\u7387\" value={`${accuracy}%`} />\n                  <StatRow label=\"\u8bad\u7ec3\u65f6\u957f\" value={`${elapsedMin} min`} />\n                  <StatRow label=\"\u5f53\u524d\u6a21\u5f0f\" value={trainingMode === \"single\" ? \"\u5355\u97f3\" : `${meterTop}/4 \u5c0f\u8282`} />\n                  <div>\n                    <div className=\"row\" style={{justifyContent:\"space-between\", marginBottom:8}}>\n                      <span className=\"muted\">\u6b63\u786e\u7387\u8fdb\u5ea6</span>\n                      <span style={{fontWeight:800}}>{accuracy}%</span>\n                    </div>\n                    <div className=\"track\"><div className=\"fill\" style={{width:`${accuracy}%`}} /></div>\n                  </div>\n                </div>\n              </div></div>\n\n              <div className=\"card\"><div className=\"card-body\">\n                <h3 className=\"section-title\">\u8584\u5f31\u97f3</h3>\n                <div className=\"stack\">\n                  {weakestNotes.map(item => <div key={item.id} className=\"stat\">\n                    <div><div style={{fontWeight:800}}>{item.id}</div><div style={{fontSize:12, color:\"#64748b\", marginTop:4}}>\u7b54\u6848\uff1a{item.label}</div></div>\n                    <span className=\"badge\">\u9519\u8bef\u7387 {item.wrongRate.toFixed(0)}%</span>\n                  </div>)}\n                </div>\n              </div></div>\n            </div>\n          </div>\n        </div></div>\n      </div>\n\n      <div className=\"sidecol\">\n        <div className=\"card\"><div className=\"card-body\">\n          <h3 className=\"section-title\">\u6df7\u6dc6\u5206\u6790</h3>\n          <div className=\"stack\">\n            {confusionPairs.length === 0 ? <div className=\"stat\" style={{color:\"#64748b\"}}>\u8fd8\u6ca1\u6709\u6df7\u6dc6\u6570\u636e\u3002\u505a\u51e0\u9898\u4e4b\u540e\uff0c\u8fd9\u91cc\u4f1a\u663e\u793a\u6700\u5bb9\u6613\u8ba4\u9519\u7684\u5bf9\u5e94\u5173\u7cfb\u3002</div>\n            : confusionPairs.map(item => <div key={item.key} className=\"stat\" style={{display:\"block\"}}><div style={{fontWeight:800}}>{item.key.replace(\"->\",\" \u8bef\u8ba4\u6210 \")}</div><div style={{fontSize:13, color:\"#64748b\", marginTop:6}}>\u51fa\u73b0 {item.count} \u6b21</div></div>)}\n          </div>\n        </div></div>\n\n        <div className=\"card\"><div className=\"card-body\">\n          <h3 className=\"section-title\">\u672c\u5730\u5b58\u6863</h3>\n          <div className=\"stack\" style={{fontSize:14, color:\"#475569\"}}>\n            <div className=\"stat\">\u5df2\u81ea\u52a8\u4fdd\u5b58\u5230\u6d4f\u89c8\u5668\u672c\u5730\uff0c\u65e0\u9700\u624b\u52a8\u63d0\u4ea4\u3002</div>\n            <div className=\"stat\">\u5f53\u524d\u7d2f\u8ba1\u8bb0\u5f55\uff1a{stats.recent.length} \u6761\u6700\u8fd1\u4f5c\u7b54\uff0c\u5b8c\u6574\u7edf\u8ba1\u5df2\u6301\u4e45\u5316\u3002</div>\n            <div className=\"stat\">\u624b\u673a\u3001\u7535\u8111\u3001\u4e0d\u540c\u6d4f\u89c8\u5668\u4e4b\u95f4\u4e0d\u4f1a\u81ea\u52a8\u540c\u6b65\u3002</div>\n          </div>\n        </div></div>\n\n        <div className=\"card\"><div className=\"card-body\">\n          <h3 className=\"section-title\">\u6700\u8fd1\u4f5c\u7b54</h3>\n          <div className=\"recent-list\">\n            {stats.recent.length === 0 ? <div className=\"stat\" style={{color:\"#64748b\"}}>\u8fd8\u6ca1\u6709\u8bb0\u5f55\u3002</div>\n            : stats.recent.map((r,idx) => <div key={idx} className=\"stat\">\n              <div><div style={{fontWeight:800}}>{r.note}</div><div style={{fontSize:12, color:\"#64748b\", marginTop:4}}>\u4f60\u7684\u7b54\u6848\uff1a{r.answer} / \u6b63\u786e\uff1a{r.correctAnswer}</div></div>\n              <span className=\"badge\" style={{background:r.isCorrect ? \"#dcfce7\" : \"#fee2e2\", color:r.isCorrect ? \"#166534\" : \"#991b1b\"}}>{r.isCorrect ? \"\u5bf9\" : \"\u9519\"}</span>\n            </div>)}\n          </div>\n        </div></div>\n      </div>\n    </div>\n  </div>;\n}\n\nReactDOM.createRoot(document.getElementById(\"root\")).render(<App />);\n});\n<\/script>\n</body>\n</html>\n";

const EAR_STORAGE_KEY = "ear_trainer_portal_v2";
const NOTE_NAMES = ["C","D","E","F","G","A","B"];
const NOTE_TO_SEMITONE = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
const CHORD_QUALITIES = [
  { id:"maj", label:"大三和弦", intervals:[0,4,7], symbol:"maj" },
  { id:"min", label:"小三和弦", intervals:[0,3,7], symbol:"min" },
  { id:"dim", label:"减三和弦", intervals:[0,3,6], symbol:"dim" },
  { id:"aug", label:"增三和弦", intervals:[0,4,8], symbol:"aug" },
];

const SINGLE_RANGE_PRESETS = {
  narrow:{ id:"narrow", label:"窄", text:"C4-B4", octaves:[4] },
  medium:{ id:"medium", label:"中", text:"C4-B5", octaves:[4,5] },
  wide:{ id:"wide", label:"宽", text:"C3-B5", octaves:[3,4,5] },
};
const DIFFICULTY_PRESETS = {
  easy:{ id:"easy", label:"简单", singleRange:"narrow", chordQualities:["maj","min"] },
  normal:{ id:"normal", label:"普通", singleRange:"medium", chordQualities:["maj","min","dim"] },
  hard:{ id:"hard", label:"困难", singleRange:"wide", chordQualities:["maj","min","dim","aug"] },
};

function buildEmptyStats(){
  const noteStats = {};
  NOTE_NAMES.forEach(n => noteStats[n] = { shown:0, correct:0, wrong:0 });
  const chordStats = {};
  CHORD_QUALITIES.forEach(q => chordStats[q.id] = { shown:0, correct:0, wrong:0 });
  return { noteStats, chordStats, recent:[] };
}
function loadStats(){
  try{
    const raw = localStorage.getItem(EAR_STORAGE_KEY);
    if(!raw) return buildEmptyStats();
    const saved = JSON.parse(raw);
    const clean = buildEmptyStats();
    NOTE_NAMES.forEach(k => { if(saved.noteStats?.[k]) clean.noteStats[k] = { ...clean.noteStats[k], ...saved.noteStats[k] }; });
    CHORD_QUALITIES.forEach(q => { if(saved.chordStats?.[q.id]) clean.chordStats[q.id] = { ...clean.chordStats[q.id], ...saved.chordStats[q.id] }; });
    clean.recent = Array.isArray(saved.recent) ? saved.recent.slice(0,30) : [];
    return clean;
  } catch {
    return buildEmptyStats();
  }
}
function saveStats(stats){ try{ localStorage.setItem(EAR_STORAGE_KEY, JSON.stringify(stats)); } catch {} }
function midiToFreq(midi){ return 440 * Math.pow(2, (midi - 69) / 12); }
function noteNameToMidi(name, octave=4){ return 12 * (octave + 1) + NOTE_TO_SEMITONE[name]; }
function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

class NaturalEarSynth {
  constructor(){
    this.ctx = null;
    this.master = null;
  }
  async ensure(){
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) throw new Error("当前浏览器不支持 Web Audio API");
    if(!this.ctx){
      this.ctx = new AudioCtx();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.32;
      this.master.connect(this.ctx.destination);
    }
    if(this.ctx.state === "suspended") await this.ctx.resume();
  }
  pianoVoice(freq, start, duration, velocity=0.55, detune=0){
    const ctx = this.ctx;
    const mix = ctx.createGain();
    const bodyFilter = ctx.createBiquadFilter();
    bodyFilter.type = "lowpass";
    bodyFilter.frequency.setValueAtTime(4200, start);
    bodyFilter.Q.value = 0.7;

    const harmonics = [
      { mul:1, gain:1.0, decay:1.0, type:"triangle" },
      { mul:2, gain:0.26, decay:0.72, type:"sine" },
      { mul:3, gain:0.14, decay:0.56, type:"sine" },
      { mul:4, gain:0.08, decay:0.42, type:"sine" },
    ];
    harmonics.forEach(h => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = h.type;
      osc.frequency.setValueAtTime(freq * h.mul, start);
      osc.detune.setValueAtTime(detune, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, velocity * h.gain), start + 0.008);
      gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, velocity * h.gain * 0.65), start + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration * h.decay);
      osc.connect(gain);
      gain.connect(bodyFilter);
      osc.start(start);
      osc.stop(start + duration + 0.08);
    });

    const hammerBuffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * 0.03)), ctx.sampleRate);
    const data = hammerBuffer.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1) * Math.exp(-i / (data.length * 0.18));
    const noise = ctx.createBufferSource();
    noise.buffer = hammerBuffer;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = "bandpass";
    noiseFilter.frequency.setValueAtTime(Math.min(5000, freq * 6), start);
    noiseFilter.Q.value = 0.8;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(velocity * 0.035, start);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, start + 0.03);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(bodyFilter);
    noise.start(start);
    noise.stop(start + 0.035);

    const softComp = ctx.createDynamicsCompressor();
    softComp.threshold.value = -24;
    softComp.knee.value = 18;
    softComp.ratio.value = 3;
    softComp.attack.value = 0.003;
    softComp.release.value = 0.12;

    mix.gain.value = 1;
    bodyFilter.connect(softComp);
    softComp.connect(mix);
    mix.connect(this.master);
  }
  async playSingle(midi){
    await this.ensure();
    const start = this.ctx.currentTime + 0.02;
    this.pianoVoice(midiToFreq(midi), start, 2.05, 0.58, -1.5);
    this.pianoVoice(midiToFreq(midi), start + 0.002, 1.95, 0.42, 1.8);
    await wait(1880);
  }
  async playChord(midis){
    await this.ensure();
    const start = this.ctx.currentTime + 0.02;
    midis.forEach((m, idx) => {
      const t = start + idx * 0.018;
      const baseFreq = midiToFreq(m);
      const vel = idx === 0 ? 0.62 : 0.5;
      this.pianoVoice(baseFreq, t, 2.7, vel, -1.8);
      this.pianoVoice(baseFreq, t + 0.002, 2.45, vel * 0.76, 2.1);
    });
    await wait(2480);
  }
}


class EarPianoEngine extends NaturalEarSynth {}

function makeSingleQuestion(rangeId = "medium"){
  const range = SINGLE_RANGE_PRESETS[rangeId] || SINGLE_RANGE_PRESETS.medium;
  const answer = NOTE_NAMES[Math.floor(Math.random() * NOTE_NAMES.length)];
  const octave = range.octaves[Math.floor(Math.random() * range.octaves.length)];
  return { kind:"single", answer, octave, midi: noteNameToMidi(answer, octave), label:`${answer}${octave}` };
}
function makeChordQuestion(difficultyId = "hard"){
  const difficulty = DIFFICULTY_PRESETS[difficultyId] || DIFFICULTY_PRESETS.hard;
  const root = NOTE_NAMES[Math.floor(Math.random() * NOTE_NAMES.length)];
  const availableQualities = CHORD_QUALITIES.filter(q => difficulty.chordQualities.includes(q.id));
  const quality = availableQualities[Math.floor(Math.random() * availableQualities.length)];
  const rootMidi = noteNameToMidi(root, 4);
  return {
    kind:"chord",
    root,
    qualityId: quality.id,
    qualityLabel: quality.label,
    symbol: quality.symbol,
    midis: quality.intervals.map(i => rootMidi + i),
    answer: `${root} ${quality.symbol}`,
  };
}
function StatRow({ label, value }){
  return <div className="stat"><span className="muted">{label}</span><span style={{fontWeight:800}}>{value}</span></div>;
}

function EarTrainer({ onBack }){
  const synthRef = useRef(new EarPianoEngine());
  const timerRef = useRef(null);
  const [audioReady, setAudioReady] = useState(false);
  const [mode, setMode] = useState("single");
  const [singleRange, setSingleRange] = useState("medium");
  const [difficulty, setDifficulty] = useState("normal");
  const [stats, setStats] = useState(() => loadStats());
  const [questionCount, setQuestionCount] = useState(0);
  const [correctCount, setCorrectCount] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [selectedNote, setSelectedNote] = useState(null);
  const [selectedChordRoot, setSelectedChordRoot] = useState(null);
  const [selectedChordQuality, setSelectedChordQuality] = useState(null);
  const [playing, setPlaying] = useState(false);
  const [question, setQuestion] = useState(() => makeSingleQuestion());
  const [sessionStartedAt] = useState(() => Date.now());

  useEffect(() => saveStats(stats), [stats]);
  useEffect(() => () => { if(timerRef.current) window.clearTimeout(timerRef.current); }, []);

  const accuracy = questionCount ? Math.round(correctCount / questionCount * 100) : 0;
  const elapsedMin = ((Date.now() - sessionStartedAt) / 60000).toFixed(1);

  const weakestNotes = useMemo(() =>
    NOTE_NAMES.map(n => {
      const s = stats.noteStats[n];
      const shown = s?.shown || 0;
      const wrongRate = shown ? (s.wrong / shown) * 100 : 0;
      return { name:n, shown, wrongRate };
    }).sort((a,b) => b.wrongRate - a.wrongRate || b.shown - a.shown).slice(0,5), [stats]);

  const weakestChords = useMemo(() =>
    CHORD_QUALITIES.map(q => {
      const s = stats.chordStats[q.id];
      const shown = s?.shown || 0;
      const wrongRate = shown ? (s.wrong / shown) * 100 : 0;
      return { id:q.id, label:q.label, shown, wrongRate };
    }).sort((a,b) => b.wrongRate - a.wrongRate || b.shown - a.shown).slice(0,4), [stats]);

  const currentAnswerText = useMemo(() => {
    if(question.kind === "single") return question.label;
    return `${question.root} ${question.symbol}（${question.qualityLabel}）`;
  }, [question]);

  const enabledChordQualities = useMemo(() => CHORD_QUALITIES.filter(q => DIFFICULTY_PRESETS[difficulty].chordQualities.includes(q.id)), [difficulty]);

  const makeQuestion = useCallback((nextMode = mode, nextRange = singleRange, nextDifficulty = difficulty) => nextMode === "single" ? makeSingleQuestion(nextRange) : makeChordQuestion(nextDifficulty), [mode, singleRange, difficulty]);

  function clearSelections(nextMode = mode, nextRange = singleRange, nextDifficulty = difficulty){
    setSelectedNote(null);
    setSelectedChordRoot(null);
    setSelectedChordQuality(null);
    setFeedback(null);
    setQuestion(makeQuestion(nextMode, nextRange, nextDifficulty));
  }

  async function enableAudio(){
    try {
      await synthRef.current.ensure();
      setAudioReady(true);
      setFeedback(null);
    } catch {
      setFeedback({ isCorrect:false, message:"当前浏览器无法初始化音频或加载钢琴采样。建议用 Edge / Chrome 联网再试。" });
    }
  }

  async function playQuestion(q = question){
    if(!audioReady){
      await enableAudio();
      if(!synthRef.current.ctx) return;
    }
    try {
      setPlaying(true);
      if(q.kind === "single") await synthRef.current.playSingle(q.midi);
      else await synthRef.current.playChord(q.midis);
    } finally {
      setPlaying(false);
    }
  }

  function recordResult(isCorrect){
    const newStats = JSON.parse(JSON.stringify(stats));
    if(question.kind === "single"){
      const s = newStats.noteStats[question.answer];
      s.shown += 1;
      if(isCorrect) s.correct += 1;
      else s.wrong += 1;
    } else {
      const s = newStats.chordStats[question.qualityId];
      s.shown += 1;
      if(isCorrect) s.correct += 1;
      else s.wrong += 1;
    }
    newStats.recent.unshift({
      mode: question.kind,
      prompt: question.kind === "single" ? "单音" : "和弦",
      yourAnswer: question.kind === "single" ? (selectedNote || "未选") : `${selectedChordRoot || "?"} ${selectedChordQuality || "?"}`,
      correctAnswer: question.kind === "single" ? question.answer : `${question.root} ${question.symbol}`,
      isCorrect,
      at: Date.now(),
    });
    newStats.recent = newStats.recent.slice(0, 30);
    setStats(newStats);
    setQuestionCount(v => v + 1);
    if(isCorrect) setCorrectCount(v => v + 1);
  }

  async function moveToNextAndPlay(){
    const nextQ = makeQuestion(mode, singleRange, difficulty);
    setSelectedNote(null);
    setSelectedChordRoot(null);
    setSelectedChordQuality(null);
    setFeedback(null);
    setQuestion(nextQ);
    await wait(180);
    await playQuestion(nextQ);
  }

  function submitAnswer(){
    if(timerRef.current) window.clearTimeout(timerRef.current);
    if(question.kind === "single"){
      if(!selectedNote){
        setFeedback({ isCorrect:false, message:"还没有选择答案。" });
        return;
      }
      const isCorrect = selectedNote === question.answer;
      recordResult(isCorrect);
      setFeedback({
        isCorrect,
        message: isCorrect ? `✔ 正确：${question.answer}。下一题将自动播放。` : `✘ 错误。正确答案是 ${question.answer}（实际播放：${question.label}）`,
      });
      if(isCorrect){
        timerRef.current = window.setTimeout(() => { moveToNextAndPlay(); }, 760);
      }
    } else {
      if(!selectedChordRoot || !selectedChordQuality){
        setFeedback({ isCorrect:false, message:"和弦模式需要同时选根音和性质。" });
        return;
      }
      const isCorrect = selectedChordRoot === question.root && selectedChordQuality === question.qualityId;
      recordResult(isCorrect);
      const quality = CHORD_QUALITIES.find(q => q.id === question.qualityId);
      setFeedback({
        isCorrect,
        message: isCorrect ? `✔ 正确：${question.root} ${quality.symbol}（${quality.label}）。下一题将自动播放。` : `✘ 错误。正确答案是 ${question.root} ${quality.symbol}（${quality.label}）`,
      });
      if(isCorrect){
        timerRef.current = window.setTimeout(() => { moveToNextAndPlay(); }, 900);
      }
    }
  }

  function nextQuestion(){ if(timerRef.current) window.clearTimeout(timerRef.current); clearSelections(mode, singleRange, difficulty); }
  function switchMode(nextMode){ if(timerRef.current) window.clearTimeout(timerRef.current); setMode(nextMode); clearSelections(nextMode, singleRange, difficulty); }
  function updateSingleRange(nextRange){ if(timerRef.current) window.clearTimeout(timerRef.current); setSingleRange(nextRange); clearSelections(mode, nextRange, difficulty); }
  function updateDifficulty(nextDifficulty){ if(timerRef.current) window.clearTimeout(timerRef.current); const suggestedRange = DIFFICULTY_PRESETS[nextDifficulty].singleRange; setDifficulty(nextDifficulty); setSingleRange(suggestedRange); clearSelections(mode, suggestedRange, nextDifficulty); }
  function resetSession(){ if(timerRef.current) window.clearTimeout(timerRef.current); setQuestionCount(0); setCorrectCount(0); clearSelections(mode, singleRange, difficulty); }
  function clearProgress(){
    if(timerRef.current) window.clearTimeout(timerRef.current);
    const clean = buildEmptyStats();
    setStats(clean);
    saveStats(clean);
    setQuestionCount(0);
    setCorrectCount(0);
    clearSelections(mode, singleRange, difficulty);
  }

  useEffect(() => {
    function onKeyDown(e){
      const tag = e.target?.tagName?.toLowerCase?.();
      if(tag === "input" || tag === "textarea" || e.target?.isContentEditable) return;
      if(e.code === "Space"){ e.preventDefault(); playQuestion(); return; }
      if(question.kind === "single"){
        const key = e.key.toUpperCase();
        if(NOTE_NAMES.includes(key)) setSelectedNote(key);
        if(e.key === "Enter") submitAnswer();
      } else {
        const key = e.key.toUpperCase();
        if(NOTE_NAMES.includes(key)) setSelectedChordRoot(key);
        if(["1","2","3","4"].includes(e.key)){
          const idx = Number(e.key) - 1;
          const q = CHORD_QUALITIES[idx];
          if(q) setSelectedChordQuality(q.id);
        }
        if(e.key === "Enter") submitAnswer();
      }
    }
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, [question, selectedNote, selectedChordRoot, selectedChordQuality, mode, audioReady]);

  return <div className="ear-trainer">
    <div className="stack">
      <div className="card"><div className="card-body">
        <div className="split">
          <div>
            <h1 className="title">练耳训练</h1>
            <p className="subtitle">单音与三和弦并行。点击上方 Doremi 主图标可回导航页；练耳部分使用内置自然钢琴感合成音。</p>
          </div>
          <div className="row">
            <button className="btn" onClick={onBack}>返回入口</button>
            <button className={mode === "single" ? "btn primary" : "btn"} onClick={() => switchMode("single")}>单音</button>
            <button className={mode === "chord" ? "btn primary" : "btn"} onClick={() => switchMode("chord")}>和弦</button>
            <button className="btn" onClick={resetSession}>重置本轮</button>
            <button className="btn" onClick={clearProgress}>清空存档</button>
          </div>
        </div>

        <div className="grid2" style={{marginTop:10}}>
          <div className="stack">
            <div className="hero">
              <div className="stack">
                <div className="pill-row">
                  <span className="hero-chip">{mode === "single" ? "当前模式：单音辨识" : "当前模式：和弦辨识"}</span>
                  <span className="hero-chip">空格键重播</span>
                  <span className="hero-chip">Enter 提交</span>
                  <span className="hero-chip">答对后自动连播</span>
                </div>
                <h2 className="hero-title">先播放，再作答</h2>
                <div className="hero-big">{mode === "single" ? "♪" : "♫"}</div>
                <div className="muted">
                  {mode === "single"
                    ? `单音模式当前训练音名，不要求区分八度；当前音高范围为 ${SINGLE_RANGE_PRESETS[singleRange].text}。`
                    : `和弦模式当前训练原位三和弦；当前难度为${DIFFICULTY_PRESETS[difficulty].label}，题库包含 ${enabledChordQualities.map(q => q.label).join("、")}。`}
                </div>
              </div>
              <div className="row">
                <button className="btn primary" onClick={() => playQuestion()} disabled={playing}>{playing ? "播放中…" : (audioReady ? "播放题目" : "启用音频并播放")}</button>
                <button className="btn secondary" onClick={nextQuestion}>换一题</button>
                <button className="btn ghost" onClick={enableAudio}>{audioReady ? "音频已就绪" : "单独启用音频"}</button>
              </div>
            </div>

            <div className="card"><div className="card-body">
              <h3 className="section-title">音高范围 / 难度</h3>
              <div className="control-grid">
                <div className="option-group">
                  <div className="option-label">单音音高范围</div>
                  <div className="seg-grid">
                    {Object.values(SINGLE_RANGE_PRESETS).map(item => <button key={item.id} className={`seg-btn ${singleRange === item.id ? "active" : ""}`} onClick={() => updateSingleRange(item.id)}>
                      <div>{item.label}</div>
                      <div style={{fontSize:12, opacity:.82, marginTop:4}}>{item.text}</div>
                    </button>)}
                  </div>
                  <div className="inline-note">当前单音题会从这个范围内随机取音高，但作答仍然只判断音名，不判断八度。</div>
                </div>
                <div className="option-group">
                  <div className="option-label">整体难度</div>
                  <div className="seg-grid">
                    {Object.values(DIFFICULTY_PRESETS).map(item => <button key={item.id} className={`seg-btn ${difficulty === item.id ? "active" : ""}`} onClick={() => updateDifficulty(item.id)}>
                      <div>{item.label}</div>
                      <div style={{fontSize:12, opacity:.82, marginTop:4}}>{SINGLE_RANGE_PRESETS[item.singleRange].text}</div>
                    </button>)}
                  </div>
                  <div className="inline-note">难度会同步收紧或放宽单音范围，并改变和弦题库：简单=大/小三，普通=加减三，困难=再加入增三。</div>
                </div>
              </div>
            </div></div>

            {mode === "single" ? <div className="card"><div className="card-body">
              <h3 className="section-title">选择音名</h3>
              <div className="answer-grid notes">
                {NOTE_NAMES.map(n => {
                  const selected = selectedNote === n;
                  const isCorrectShown = feedback && question.kind === "single" && question.answer === n;
                  const isWrongShown = feedback && selected && !feedback.isCorrect;
                  return <button key={n} className={`ans-btn ${selected ? "selected" : ""} ${isCorrectShown ? "correct" : ""} ${isWrongShown ? "wrong" : ""}`} onClick={() => setSelectedNote(n)}>{n}</button>;
                })}
              </div>
              <div style={{height:12}} />
              <div className="row">
                <button className="btn primary" onClick={submitAnswer}>提交答案</button>
                <div className="muted">键盘可直接按 C D E F G A B 选择。</div>
              </div>
            </div></div> : <div className="card"><div className="card-body">
              <h3 className="section-title">先选根音</h3>
              <div className="answer-grid notes">
                {NOTE_NAMES.map(n => {
                  const selected = selectedChordRoot === n;
                  const isCorrectShown = feedback && question.kind === "chord" && question.root === n;
                  const isWrongShown = feedback && selected && selectedChordRoot !== question.root;
                  return <button key={n} className={`ans-btn ${selected ? "selected" : ""} ${isCorrectShown ? "correct" : ""} ${isWrongShown ? "wrong" : ""}`} onClick={() => setSelectedChordRoot(n)}>{n}</button>;
                })}
              </div>
              <div style={{height:16}} />
              <h3 className="section-title">再选性质</h3>
              <div className="answer-grid qualities">
                {enabledChordQualities.map((q, idx) => {
                  const selected = selectedChordQuality === q.id;
                  const isCorrectShown = feedback && question.kind === "chord" && question.qualityId === q.id;
                  const isWrongShown = feedback && selected && selectedChordQuality !== question.qualityId;
                  return <button key={q.id} className={`ans-btn ${selected ? "selected" : ""} ${isCorrectShown ? "correct" : ""} ${isWrongShown ? "wrong" : ""}`} onClick={() => setSelectedChordQuality(q.id)}>
                    <div>{q.label}</div>
                    <div className="muted" style={{fontSize:12, marginTop:4}}>快捷键 {idx + 1}</div>
                  </button>;
                })}
              </div>
              <div style={{height:12}} />
              <div className="row">
                <button className="btn primary" onClick={submitAnswer}>提交答案</button>
                <div className="muted">键盘：C D E F G A B 选根音，1 2 3 4 选性质。</div>
              </div>
            </div></div>}

            {feedback && <div className={feedback.isCorrect ? "feedback-ok" : "feedback-bad"}>{feedback.message}</div>}

            <div className="card"><div className="card-body" style={{fontSize:14,color:"#475569"}}>
              <div className="stack">
                <div>当前版本只使用浏览器内置合成音，不依赖外部采样或联网加载，因此更稳定。</div>
                <div>和弦部分仍保留极短的分散入键，让起音比纯机械同时触发更自然。</div>
                <div>单音和和弦的发音时值都已经拉长，尤其是和弦保持时间更久，听辨会更从容一些。</div>
              </div>
            </div></div>
          </div>

          <div className="stack">
            <div className="card"><div className="card-body">
              <h3 className="section-title">本轮状态</h3>
              <div className="stack">
                <StatRow label="总作答数" value={questionCount} />
                <StatRow label="正确数" value={correctCount} />
                <StatRow label="正确率" value={`${accuracy}%`} />
                <StatRow label="训练时长" value={`${elapsedMin} min`} />
                <StatRow label="当前答案" value={feedback ? <span className="mono">{currentAnswerText}</span> : "未揭晓"} />
                <div>
                  <div className="row" style={{justifyContent:"space-between", marginBottom:8}}>
                    <span className="muted">正确率进度</span>
                    <span style={{fontWeight:800}}>{accuracy}%</span>
                  </div>
                  <div className="track"><div className="fill" style={{width:`${accuracy}%`}} /></div>
                </div>
              </div>
            </div></div>

            <div className="card"><div className="card-body">
              <h3 className="section-title">单音薄弱项</h3>
              <div className="stack">
                {weakestNotes.map(item => <div key={item.name} className="stat">
                  <div><div style={{fontWeight:800}}>{item.name}</div><div style={{fontSize:12, color:"#64748b", marginTop:4}}>出现 {item.shown} 次</div></div>
                  <span className="badge">错误率 {item.wrongRate.toFixed(0)}%</span>
                </div>)}
              </div>
            </div></div>

            <div className="card"><div className="card-body">
              <h3 className="section-title">和弦薄弱项</h3>
              <div className="stack">
                {weakestChords.map(item => <div key={item.id} className="stat">
                  <div><div style={{fontWeight:800}}>{item.label}</div><div style={{fontSize:12, color:"#64748b", marginTop:4}}>出现 {item.shown} 次</div></div>
                  <span className="badge">错误率 {item.wrongRate.toFixed(0)}%</span>
                </div>)}
              </div>
            </div></div>

            <div className="card"><div className="card-body">
              <h3 className="section-title">最近作答</h3>
              <div className="recent-list">
                {stats.recent.length === 0 ? <div className="stat" style={{color:"#64748b"}}>还没有记录。</div>
                : stats.recent.map((r, idx) => <div key={idx} className="stat">
                    <div>
                      <div style={{fontWeight:800}}>{r.prompt}</div>
                      <div style={{fontSize:12, color:"#64748b", marginTop:4}}>你的答案：{r.yourAnswer}</div>
                      <div style={{fontSize:12, color:"#64748b", marginTop:4}}>正确答案：{r.correctAnswer}</div>
                    </div>
                    <span className="badge" style={{background:r.isCorrect ? "#dcfce7" : "#fee2e2", color:r.isCorrect ? "#166534" : "#991b1b"}}>{r.isCorrect ? "对" : "错"}</span>
                  </div>)}
              </div>
            </div></div>
          </div>
        </div>
      </div></div>
    </div>
  </div>;
}

function AppHeader({ onHome, view }){
  return <div className="card brand-card"><div className="card-body brand-body">
    <button type="button" className="brand-btn" onClick={onHome}>
      <div className="brand-icon">♪</div>
      <div>
        <div className="brand-title">Doremi</div>
        <div className="brand-subtitle">识谱 / 乐理 / 听觉练习</div>
      </div>
    </button>
    <div className="brand-right">
      {view === "home"
        ? <span className="hero-chip">从这里开始今天的练习</span>
        : <span className="hero-chip">点击标识返回首页</span>}
    </div>
  </div></div>;
}

function PortalApp(){
  const [view, setView] = useState("home");
  return <div className="page"><div className="shell portal-shell">
    <AppHeader view={view} onHome={() => setView("home")} />
    {view === "home" && <Home onOpen={setView} />}
    {view === "ear" && <EarTrainer onBack={() => setView("home")} />}
    {view === "staff" && <StaffFrame onBack={() => setView("home")} />}
  </div></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<PortalApp />);
});

  </script>
</body>
</html>
